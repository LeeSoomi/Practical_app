<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" role="img">
  <title>Chest X-ray simulation for education</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/><stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <radialGradient id="lungL" cx="40%" cy="45%" r="50%"><stop offset="0%" style="stop-color:#334155;stop-opacity:0.9"/><stop offset="100%" style="stop-color:#1e293b;stop-opacity:0.5"/></radialGradient>
    <radialGradient id="lungR" cx="60%" cy="45%" r="50%"><stop offset="0%" style="stop-color:#334155;stop-opacity:0.9"/><stop offset="100%" style="stop-color:#1e293b;stop-opacity:0.5"/></radialGradient>
  </defs>
  <rect width="480" height="280" fill="url(#bg)" rx="12"/>
  <text x="240" y="28" fill="#94a3b8" font-size="13" font-family="system-ui,sans-serif" text-anchor="middle">AI view - chest image (simulation)</text>
  <path d="M120 60 Q240 40 360 60" fill="none" stroke="#475569" stroke-width="2" opacity="0.4"/>
  <path d="M110 200 Q240 220 370 200" fill="none" stroke="#475569" stroke-width="2" opacity="0.4"/>
  <ellipse cx="240" cy="130" rx="95" ry="75" fill="none" stroke="#64748b" stroke-width="1.5" opacity="0.35"/>
  <ellipse cx="185" cy="125" rx="52" ry="68" fill="url(#lungL)"/>
  <ellipse cx="295" cy="125" rx="52" ry="68" fill="url(#lungR)"/>
  <ellipse cx="310" cy="155" rx="38" ry="32" fill="#cbd5e1" opacity="0.45"/>
  <ellipse cx="305" cy="160" rx="22" ry="18" fill="#e2e8f0" opacity="0.35"/>
  <text x="310" y="200" fill="#fbbf24" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">Opacity (RLL)</text>
  <rect x="20" y="240" width="440" height="28" rx="6" fill="#334155" opacity="0.8"/>
  <text x="240" y="259" fill="#a5b4fc" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">Fever + cough + imaging fusion</text>
